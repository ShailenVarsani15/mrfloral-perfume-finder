<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Floral Perfume Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2 style="text-align: center; color: #333;">Mr Floral Perfume Finder</h2>
    
    <div class="search-container">
        <div class="field-group filter-field">
            <label class="field-label" for="typeFilter">Filter by Product Type</label>
            <select id="typeFilter" onchange="runSearch()">
                <option value="all">All Types</option>
                <option value="perfume">Perfumes</option>
                <option value="candle">Candles</option>
                <option value="handwash">Hand Washes</option>
                <option value="hand cream">Hand Creams / Lotions</option>
                <option value="bodywash">Body Washes</option>
            </select>
        </div>
        <div class="field-group search-field">
            <label class="field-label" for="findInput">Search by Fragrance Note, Name, or Brand</label>
            <input type="text" id="findInput" placeholder="Type a fragrance note (like oud, rose, vanilla)..." autocomplete="off">
        </div>
    </div>

    <div class="pills">
        <span class="pill" onclick="clickPill('rose')">Rose</span>
        <span class="pill" onclick="clickPill('vanilla')">Vanilla</span>
        <span class="pill" onclick="clickPill('saffron')">Saffron</span>
        <span class="pill" onclick="clickPill('cannabis')">Cannabis</span>
        <span class="pill" onclick="clickPill('aldehyd')">Aldehydes</span>
    </div>
    <div id="output"></div>

    <script src="database-tobali.js"></script>
    <script src="database-19-69.js"></script>
    <script src="database-byredo.js"></script>
    <script src="database-dorsay.js"></script>
    <script>
        const database = [
            ...database_tobali,
            ...database_1969,
            ...database_byredo,
            ...database_dorsay
        ];

        document.getElementById('findInput').onkeyup = function() {
            runSearch();
        };

        function clickPill(val) {
            document.getElementById('findInput').value = val;
            runSearch();
        }

        function runSearch() {
            const targetWord = document.getElementById('findInput').value.toLowerCase().trim();
            const selectedType = document.getElementById('typeFilter').value;
            const outArea = document.getElementById('output');
            outArea.innerHTML = '';

            let matches = database.filter(item => {
                const matchesType = (selectedType === 'all' || item.type === selectedType);
                
                const notes = item.notes || [];
                const name = item.name ? item.name.toLowerCase() : '';
                const brand = item.brand ? item.brand.toLowerCase() : '';

                const noteFound = notes.some(n => n.toLowerCase().includes(targetWord));
                const nameFound = name.includes(targetWord);
                const brandFound = brand.includes(targetWord);
                const matchesText = targetWord === '' || noteFound || nameFound || brandFound;
                
                return matchesType && matchesText;
            });

            matches.sort((a, b) => {
                const sizeA = a.size_value || 0;
                const sizeB = b.size_value || 0;
                return sizeB - sizeA; 
            });

            if (matches.length === 0) {
                outArea.innerHTML = '<p style="text-align:center; color:#999;">No results found.</p>';
                return;
            }

            matches.forEach(item => {
                const element = document.createElement('div');
                element.className = 'card';
                
                const notesArray = item.notes || [];
                const tagsStr = notesArray.map(n => `<span class="tag">${n}</span>`).join('');
                
                element.innerHTML = `
                    <div class="img-box">
                        <img src="${item.image || ''}" alt="Preview" onerror="this.onerror=null; this.src='https://placehold.co/100x100?text=No+Image';">
                    </div>
                    <div class="info">
                        <div class="brand">${item.brand || 'Unknown Brand'}</div>
                        <div class="title">${item.name || 'Untitled'}</div>
                        <a class="link" href="${item.url || '#'}" target="_blank">View Listing &rarr;</a>
                        <div>${tagsStr}</div>
                    </div>
                `;
                outArea.appendChild(element);
            });
        }
    </script>
</body>
</html>
