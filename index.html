<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Floral Perfume Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2 style="text-align: center; color: #333;">Find your scent at Mr Floral</h2>
    
    <div class="search-container">
        <div class="field-group filter-field">
            <label class="field-label" for="typeFilter">Filter by Product Type</label>
            <select id="typeFilter" onchange="runSearch()">
                <option value="all">All Types</option>
                <option value="perfume">Perfumes</option>
                <option value="candle">Candles</option>
                <option value="handwash">Hand Washes</option>
                <option value="hand cream">Hand Creams / Lotions</option>
                <option value="bodywash">Body Washes</option>
            </select>
        </div>
        <div class="field-group search-field">
            <label class="field-label" for="findInput">Search by Fragrance Notes, Name, or Brand</label>
            <input type="text" id="findInput" placeholder="Type multiple notes (like: rose, oud)..." autocomplete="on">
        </div>
    </div>

    <div class="pills">
        <p class="pill-label">Popular scents</p>
        <span class="pill" onclick="clickPill('rose')">Rose</span>
        <span class="pill" onclick="clickPill('vanilla')">Vanilla</span>
        <span class="pill" onclick="clickPill('saffron')">Saffron</span>
        <span class="pill" onclick="clickPill('Cedarwood')">Cedarwood</span>
        <span class="pill" onclick="clickPill('tonka bean')">Tonka Bean</span>
    </div>
    <div id="output"></div>

    <script src="database-tobali.js"></script>
    <script src="database-19-69.js"></script>
    <script src="database-byredo.js"></script>
    <script src="database-dorsay.js"></script>
    <script>
        const database = [
            ...database_tobali,
            ...database_1969,
            ...database_byredo,
            ...database_dorsay
        ];

        document.getElementById('findInput').onkeyup = function() {
            runSearch();
        };

        function clickPill(val) {
            const inputEl = document.getElementById('findInput');
            const currentVal = inputEl.value.trim();
            
            if (currentVal === '') {
                inputEl.value = val;
            } else {
                // Split current input into an array of lowercase keywords
                const existingKeywords = currentVal.split(',').map(k => k.trim().toLowerCase());
                const targetPill = val.toLowerCase();
                
                if (existingKeywords.includes(targetPill)) {
                    // SELECTION REVERSAL: If the pill is already active, remove it from the input on click!
                    const updatedKeywords = currentVal.split(',')
                        .map(k => k.trim())
                        .filter(k => k.toLowerCase() !== targetPill);
                    inputEl.value = updatedKeywords.join(', ');
                } else {
                    // Append the new pill keyword with a comma
                    inputEl.value = currentVal + ", " + val;
                }
            }
            runSearch();
        }

        function runSearch() {
            const searchInput = document.getElementById('findInput').value.toLowerCase();
            const keywords = searchInput.split(',').map(k => k.trim()).filter(k => k !== '');
            const selectedType = document.getElementById('typeFilter').value;
            const outArea = document.getElementById('output');
            outArea.innerHTML = '';

            // --- PILL STATE SYNC ENGINE ---
            // Loop through every DOM element with the class "pill"
            const allPills = document.querySelectorAll('.pill');
            allPills.forEach(pill => {
                // Get the unique note text for this pill (e.g., 'rose' or 'vanilla')
                // We extract it from the onclick attribute string: clickPill('rose') -> rose
                const pillAttribute = pill.getAttribute('onclick');
                const pillValueMatch = pillAttribute.match(/'([^']+)'/);
                
                if (pillValueMatch) {
                    const pillNote = pillValueMatch[1].toLowerCase();
                    
                    // If this pill's exact note is present in the search keywords array, light it up!
                    if (keywords.includes(pillNote)) {
                        pill.classList.add('active');
                    } else {
                        pill.classList.remove('active');
                    }
                }
            });
            // ------------------------------

            let matches = database.filter(item => {
                const matchesType = (selectedType === 'all' || item.type === selectedType);
                if (keywords.length === 0) return matchesType;
                
                const notes = item.notes || [];
                const name = item.name ? item.name.toLowerCase() : '';
                const brand = item.brand ? item.brand.toLowerCase() : '';

                const matchesText = keywords.every(keyword => {
                    const noteFound = notes.some(n => n.toLowerCase().includes(keyword));
                    const nameFound = name.includes(keyword);
                    const brandFound = brand.includes(keyword);
                    return noteFound || nameFound || brandFound;
                });
                
                return matchesType && matchesText;
            });

            matches.sort((a, b) => {
                const sizeA = a.size_value || 0;
                const sizeB = b.size_value || 0;
                return sizeB - sizeA; 
            });

            if (matches.length === 0) {
                outArea.innerHTML = '<p style="text-align:center; color:#999;">No results found match all criteria.</p>';
                return;
            }

            matches.forEach(item => {
                const element = document.createElement('div');
                element.className = 'card';
                
                const notesArray = item.notes || [];
                
                // Loops through notes and adds 'active' class ONLY if it matches a search keyword
                const tagsStr = notesArray.map(n => {
                    const isMatched = keywords.some(keyword => n.toLowerCase().includes(keyword));
                    const activeClass = isMatched ? 'active' : '';
                    return `<span class="tag ${activeClass}">${n}</span>`;
                }).join('');
                
                element.innerHTML = `
                    <div class="img-box">
                        <img src="${item.image || ''}" alt="Preview" onerror="this.onerror=null; this.src='https://placehold.co/100x100?text=No+Image';">
                    </div>
                    <div class="info">
                        <div class="brand">${item.brand || 'Unknown Brand'}</div>
                        <div class="title">${item.name || 'Untitled'}</div>
                        <div class="tags-container">${tagsStr}</div>
                        <a class="shop-now-btn" href="${item.url || '#'}" target="_blank">SHOP NOW</a>
                    </div>
                `;
                outArea.appendChild(element);
            });
        }
    </script>
</body>
</html>
